name: Hourly signal scan

on:
  push:
    branches: [main]
  schedule:
    # Every hour on the hour, Mon-Fri, UTC 14-21.
    # Covers US market hours in both EDT (14-20) and EST (15-21).
    - cron: "0 14-21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        if: github.event_name != 'push'
        env:
          UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
        run: python -m app.main

      - name: Commit data changes
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            data/raw_flow/ \
            data/trade_log.csv \
            data/positions.json \
            data/watchlist.json \
            data/equity_curve.csv \
            data/final_signals/ \
            data/ranked_candidates/ \
            data/flow_features/ \
            data/market_regime.json \
            data/positions_agent.json \
            data/trade_log_agent.csv \
            data/equity_curve_agent.csv \
            data/agent_shadow/ \
            || true
          git diff --cached --quiet && echo "No data changes to commit" && exit 0
          git commit -m "auto: hourly scan $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Build static dashboard
        env:
          UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
        run: python -m scripts.build_static

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
