name: Hourly signal scan

on:
  schedule:
    # Every hour on the hour, Mon-Fri, UTC 14-22.
    # Covers US market hours in both EDT (14-20) and EST (15-21),
    # plus a post-close buffer: the 21:00 UTC slot is our primary
    # "stamp today" scan (17:00 ET in EDT, past the 16:15 ET cutoff
    # in `app.utils.market_calendar.POST_CLOSE_CUTOFF`), and 22:00 UTC
    # is an idempotent backup.  GitHub Actions routinely skips
    # scheduled runs under platform load and does NOT retry missed
    # runs, so the 22:00 slot is insurance against losing a session
    # from `screener_snapshots.csv` entirely.  Winter (EST) also
    # benefits: 22:00 UTC = 17:00 ET, which clears the cutoff even
    # when the 21:00 UTC slot (= 16:00 ET in EST) would not.
    - cron: "0 14-22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
          STOCKTWITS_API_KEY: ${{ secrets.STOCKTWITS_API_KEY }}
        run: python -m app.main

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Explicit allowlist of pipeline outputs.  Added Wave 2 / Wave 8
          # caches (iv_rank_history, market_indicators) and the grade
          # backtest + flow_stats meta files — without these the runner
          # left them unstaged, which made ``git pull --rebase`` bail out
          # on push-rejection retries.  Always keep this list in sync
          # with whatever pipeline steps write under ``data/``.
          for f in \
            data/raw_flow/ \
            data/trade_log.csv \
            data/positions.json \
            data/watchlist.json \
            data/equity_curve.csv \
            data/final_signals/ \
            data/ranked_candidates/ \
            data/flow_features/ \
            data/market_regime.json \
            data/positions_agent.json \
            data/trade_log_agent.csv \
            data/equity_curve_agent.csv \
            data/agent_shadow/ \
            data/screener_snapshots.csv \
            data/sentiment_snapshots.csv \
            data/dark_pool_recent.json \
            data/dp_snapshots.csv \
            data/hottest_chains.json \
            data/insider_recent.json \
            data/earnings_cache.json \
            data/iv_rank_history.json \
            data/market_indicators.json \
            data/grade_stats.json \
            data/flow_stats_meta.json \
            data/zscore_coverage_history.json \
            data/sector_heat/ \
            data/sector_heat_history.csv \
            data/saw_couldnt_trade/ \
            data/saw_couldnt_trade_history.csv \
            data/audit_reports/ \
            data/snapshots_archive.csv.gz \
            data/grade_history.csv \
            data/grade_attribution.json \
            data/_ohlcv_cache/; do
            # Tolerate `git add` exit-1 for paths that happen to be
            # gitignored — `set -e` would otherwise kill the whole
            # step (see 2026-04-21 failure for grade_history.csv).
            # If a file truly needs tracking, fix .gitignore; we
            # don't want to paper over genuine add failures, but we
            # also don't want a single stale listed path to break
            # the hourly scan.
            [ -e "$f" ] && git add "$f" || true
          done
          git diff --cached --quiet && echo "No data changes to commit" && exit 0
          git commit -m "auto: hourly scan $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Retry push up to 3 times with pull --rebase on conflict.
          # ``--autostash`` auto-stashes any residual unstaged changes
          # (e.g. new data files we haven't listed yet) so the rebase
          # doesn't bail with "cannot pull with rebase: You have
          # unstaged changes".
          for attempt in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              break
            fi
            echo "Push failed (attempt $attempt), pulling and retrying..."
            git pull --rebase --autostash origin main || true
          done

      - name: Build static dashboard
        env:
          UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
        run: python -m scripts.build_static

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
